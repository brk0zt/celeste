name: Build and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        # .env değişkenini tanımlayarak Vite'ın içindeki API adresini Render'daki adresle değiştiriyoruz
        env:
          VITE_API_URL: "https://celeste-backend-ztga.onrender.com" # Buraya kendi Render URL'ni yaz
        run: npm run build

      # --- 404 HATASI İÇİN SPA ÇÖZÜMÜ ---
      # React Router'ın GitHub Pages'te sorunsuz çalışması için index.html'i 404.html olarak kopyalıyoruz
      - name: Create SPA 404.html
        run: cp ./dist/public/index.html ./dist/public/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/public' # Doğru klasör dizini

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
