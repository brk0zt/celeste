# .github/workflows/deploy.yml dosyasının içeriği
name: Build and Deploy

on:
  push:
    branches: [ main ]  # Ana dalınıza her push yaptığınızda tetiklenir

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Projenize göre Node.js sürümünü package.json'dan okuyabilir veya sabitleyebilirsiniz
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Veya projenizde kullanılan sürüm (örn. '18', '16')

      - name: Install Dependencies
        run: npm ci  # npm install yerine daha hızlı ve güvenilir olan npm ci kullanılır

      # Projenizin build komutunu buraya yazın. package.json'dan bakabilirsiniz.
      - name: Build Project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Projenizin derlenmiş çıktısının klasör adı. Bunu kontrol etmeniz gerekli!
          path: './dist'  # React, Vite, Vue projeleri için genelde 'dist', Angular için 'dist/your-project-name'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4